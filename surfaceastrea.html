<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Astrea - Planetary Interface</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2a0805;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 100, 50, 0.8);
            z-index: 10;
            background: rgba(40, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
        }
    </style>
</head>
<body>
    <div id="info">Astrea - Surface of the Sun<br/>WASD to move | Space to Jump | Walk up to spirits!</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a0805); // Sun-like dark orange/red
        scene.fog = new THREE.FogExp2(0x2a0805, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0);

        // WASD Movement state
        const moveState = { forward: false, backward: false, left: false, right: false };
        const moveSpeed = 0.25;
        
        // Gravity & Jump state
        let playerVelocityY = 0;
        let canJump = false;
        const playerHeight = 2.0;
        const gravity = 0.015;
        const jumpStrength = 0.35;

        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': case 'ArrowUp': moveState.forward = true; break;
                case 'KeyS': case 'ArrowDown': moveState.backward = true; break;
                case 'KeyA': case 'ArrowLeft': moveState.left = true; break;
                case 'KeyD': case 'ArrowRight': moveState.right = true; break;
                case 'Space': 
                    if (canJump) {
                        playerVelocityY = jumpStrength;
                        canJump = false;
                    }
                    break;
            }
        });

        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': case 'ArrowUp': moveState.forward = false; break;
                case 'KeyS': case 'ArrowDown': moveState.backward = false; break;
                case 'KeyA': case 'ArrowLeft': moveState.left = false; break;
                case 'KeyD': case 'ArrowRight': moveState.right = false; break;
            }
        });

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x4a110a, 2.0);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffbb88, 1.2);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        const orangeLight = new THREE.PointLight(0xff6600, 3, 50);
        orangeLight.position.set(-10, 5, -10);
        scene.add(orangeLight);

        const purpleLight = new THREE.PointLight(0x9922ff, 3, 50);
        purpleLight.position.set(10, 5, -10);
        scene.add(purpleLight);

        // Terrain: Smooth, flowing shapes, energy fields turned solid
        const terrainGeo = new THREE.PlaneGeometry(100, 100, 128, 128);
        terrainGeo.rotateX(-Math.PI / 2);
        
        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const z = pos.getZ(i);
            // Smooth sine waves combined
            let y = Math.sin(x * 0.1) * Math.cos(z * 0.1) * 2.0;
            y += Math.sin(x * 0.05 + z * 0.03) * 3.0;
            y += Math.sin(x * 0.2 - z * 0.2) * 0.5;
            pos.setY(i, y);
        }
        terrainGeo.computeVertexNormals();

        // Custom shader for glowing energy terrain
        const terrainMat = new THREE.MeshStandardMaterial({
            color: 0x330011, // Dark purple base
            emissive: 0x441100, // Orange glow
            roughness: 1.0,  // Completely matte
            metalness: 0.0,
            flatShading: false
        });

        // Use onBeforeCompile to add soft energy grid lines or pulsing
        terrainMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = { value: 0 };
            shader.vertexShader = `
                varying vec3 vWorldPosition;
                ` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(
                `#include <worldpos_vertex>`,
                `
                #include <worldpos_vertex>
                vWorldPosition = (modelMatrix * vec4(transformed, 1.0)).xyz;
                `
            );
            shader.fragmentShader = `
                uniform float time;
                varying vec3 vWorldPosition;
                ` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(
                `vec4 diffuseColor = vec4( diffuse, opacity );`,
                `
                // Smooth glowing ground (no dark spots)
                float pulse = sin(time * 1.5 - length(vWorldPosition.xz) * 0.3) * 0.5 + 0.5;
                vec3 energyColor = mix(vec3(0.8, 0.3, 0.0), vec3(0.6, 0.1, 0.9), pulse); // Orange to purple
                vec3 finalColor = diffuse + energyColor * 1.2;
                vec4 diffuseColor = vec4( finalColor, opacity );
                `
            );
            terrainMat.userData.shader = shader;
        };

        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        terrain.receiveShadow = true;
        scene.add(terrain);

        // Floating islands
        const islandGeo = new THREE.SphereGeometry(1, 32, 32);
        for (let i = 0; i < 15; i++) {
            const island = new THREE.Mesh(islandGeo, terrainMat);
            island.scale.set(Math.random() * 3 + 2, Math.random() * 0.5 + 0.2, Math.random() * 3 + 2);
            island.position.set(
                (Math.random() - 0.5) * 60,
                Math.random() * 10 + 5,
                (Math.random() - 0.5) * 60
            );
            island.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            island.castShadow = true;
            island.receiveShadow = true;
            scene.add(island);
            
            // Animation data
            island.userData = {
                baseY: island.position.y,
                offset: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.5 + 0.5
            };
        }

        // Aurora Spirits (Made of Fire)
        const auroras = [];
        const auroraColors = [
            0xff4400, // Fiery orange
            0xffaa00, // Yellow-orange
            0xffddaa, // Intense white-yellow
            0xff0088, // Bright magenta/pink fire
            0x0088ff, // Bright blue
            0x6600ff  // Deep purple
        ];

        // Shader for flame body
        const blobVertexShader = `
            uniform float time;
            uniform float energy;
            varying vec3 vNormal;
            varying vec3 vPosition;
            varying vec3 vViewPosition;

            // Simple 3D noise
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute(permute(permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857;
                vec3 ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                vec3 p0 = vec3(a0.xy, h.x);
                vec3 p1 = vec3(a0.zw, h.y);
                vec3 p2 = vec3(a1.xy, h.z);
                vec3 p3 = vec3(a1.zw, h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }

            void main() {
                vNormal = normalize(normalMatrix * normal);
                
                float noise = snoise(position * 3.0 + time * energy * 3.0);
                vec3 newPosition = position;
                
                // Flame shape modifier
                float yNorm = position.y + 0.5; // roughly 0 to 1
                float taper = smoothstep(0.0, 1.2, 1.0 - yNorm);
                
                newPosition.xz *= taper; // Pinch at the top
                newPosition.y += yNorm * 0.5; // Stretch upwards
                newPosition += normal * noise * 0.15 * taper; // Wobble mainly top/middle
                
                vec4 mvPosition = modelViewMatrix * vec4(newPosition, 1.0);
                vViewPosition = -mvPosition.xyz;
                vPosition = newPosition;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const blobFragmentShader = `
            uniform vec3 color;
            varying vec3 vNormal;
            varying vec3 vViewPosition;

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                
                // Strong Fresnel glow for fire
                float fresnel = dot(viewDir, normal);
                fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
                fresnel = pow(fresnel, 1.5);
                
                vec3 coreColor = mix(vec3(1.0), color, 0.4); // Bright hot core
                vec3 glowColor = color * 2.5; // Intense edge
                
                vec3 finalColor = mix(coreColor, glowColor, fresnel);
                
                gl_FragColor = vec4(finalColor, 0.95); // Mostly opaque fire
            }
        `;

        const bodyGeo = new THREE.IcosahedronGeometry(0.5, 16);

        // Face texturing to match reference
        function createCuteFaceTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.shadowColor = '#ffffee';
            ctx.shadowBlur = 15;
            
            // Eyes ^ ^
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 16;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            ctx.arc(80, 110, 20, Math.PI, 0);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(176, 110, 20, Math.PI, 0);
            ctx.stroke();
            
            // Cheeks
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff5555';
            ctx.fillStyle = '#ffaaaa';
            ctx.beginPath();
            ctx.ellipse(40, 140, 15, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(216, 140, 15, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Open Mouth D
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#440000';
            ctx.beginPath();
            ctx.arc(128, 130, 20, 0, Math.PI);
            ctx.fill();
            
            // Tongue
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(128, 140, 12, 0, Math.PI);
            ctx.fill();
            
            return new THREE.CanvasTexture(canvas);
        }

        function createBlinkFaceTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.shadowColor = '#ffffee';
            ctx.shadowBlur = 15;
            
            // Blink eyes - -
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 16;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            ctx.moveTo(60, 110);
            ctx.lineTo(100, 110);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(156, 110);
            ctx.lineTo(196, 110);
            ctx.stroke();
            
            // Keep cheeks
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff5555';
            ctx.fillStyle = '#ffaaaa';
            ctx.beginPath();
            ctx.ellipse(40, 140, 15, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(216, 140, 15, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Mouth
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#440000';
            ctx.beginPath();
            ctx.arc(128, 130, 20, 0, Math.PI);
            ctx.fill();
            
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(128, 140, 12, 0, Math.PI);
            ctx.fill();
            
            return new THREE.CanvasTexture(canvas);
        }

        function createHappyFaceTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.shadowColor = '#ffffee';
            ctx.shadowBlur = 15;
            
            // Happy eyes > <
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Left eye >
            ctx.beginPath();
            ctx.moveTo(65, 95);
            ctx.lineTo(95, 110);
            ctx.lineTo(65, 125);
            ctx.stroke();
            
            // Right eye <
            ctx.beginPath();
            ctx.moveTo(191, 95);
            ctx.lineTo(161, 110);
            ctx.lineTo(191, 125);
            ctx.stroke();
            
            // Cheeks
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff5555';
            ctx.fillStyle = '#ffaaaa';
            ctx.beginPath();
            ctx.ellipse(40, 140, 15, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(216, 140, 15, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Big open mouth D
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#440000';
            ctx.beginPath();
            ctx.arc(128, 135, 25, 0, Math.PI); // Bigger mouth
            ctx.fill();
            
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(128, 145, 14, 0, Math.PI);
            ctx.fill();
            
            return new THREE.CanvasTexture(canvas);
        }

        const faceTexOpen = createCuteFaceTexture();
        const faceTexBlink = createBlinkFaceTexture();
        const faceTexHappy = createHappyFaceTexture();
        
        const faceGeo = new THREE.PlaneGeometry(0.8, 0.8);

        for (let i = 0; i < 12; i++) {
            const spirit = new THREE.Group();
            
            // Two of each color
            let colorIdx = Math.floor(i / 2);
            let energyLevel;
            
            if (colorIdx === 0) {
                energyLevel = 1.0; // orange
            } else if (colorIdx === 1) {
                energyLevel = 1.5; // yellow-orange
            } else if (colorIdx === 2) {
                energyLevel = 2.5; // white-yellow
            } else if (colorIdx === 3) {
                energyLevel = 3.0; // magenta
            } else if (colorIdx === 4) {
                energyLevel = 1.2; // blue
            } else {
                energyLevel = 1.8; // purple
            }
            
            const color = new THREE.Color(auroraColors[colorIdx]);
            
            const bodyMat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    color: { value: color },
                    energy: { value: energyLevel }
                },
                vertexShader: blobVertexShader,
                fragmentShader: blobFragmentShader,
                transparent: true,
                side: THREE.DoubleSide
            });
            
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            spirit.add(body);
            
            // Add point light matching fire color
            const light = new THREE.PointLight(color, energyLevel * 0.8, 8);
            spirit.add(light);
            
            // Add face
            const faceMat = new THREE.MeshBasicMaterial({
                map: faceTexOpen,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const face = new THREE.Mesh(faceGeo, faceMat);
            face.position.set(0, 0.2, 0.38); // Brought much closer to align perfectly with flame body
            spirit.add(face);
            
            // Position
            spirit.position.set(
                (Math.random() - 0.5) * 40,
                Math.random() * 3 + 1,
                (Math.random() - 0.5) * 40
            );
            
            scene.add(spirit);
            
            auroras.push({
                obj: spirit,
                body: body,
                faceMat: faceMat,
                energy: energyLevel,
                baseY: spirit.position.y,
                phase: Math.random() * Math.PI * 2,
                speedX: (Math.random() - 0.5) * energyLevel * 0.04,
                speedZ: (Math.random() - 0.5) * energyLevel * 0.04,
                blinkTimer: Math.random() * 150,
                isBlinking: false
            });
        }

        // Add embers (fire particles)
        const particleGeo = new THREE.BufferGeometry();
        const pCount = 1500;
        const pPos = new Float32Array(pCount * 3);
        const pColors = new Float32Array(pCount * 3);
        
        for(let i=0; i<pCount*3; i+=3) {
            pPos[i] = (Math.random() - 0.5) * 60;
            pPos[i+1] = Math.random() * 20;
            pPos[i+2] = (Math.random() - 0.5) * 60;
            
            pColors[i] = 1.0; // R
            pColors[i+1] = 0.3 + Math.random()*0.5; // G (orange-yellow spectrum)
            pColors[i+2] = 0.0; // B
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
        
        const particleMat = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            map: createCircleTexture(),
            depthWrite: false
        });
        
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(255,200,100,0.8)');
            gradient.addColorStop(1, 'rgba(255,100,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // Animation Loop
        const clock = new THREE.Clock();

        function render() {
            const time = clock.getElapsedTime();

            // Handle WASD movement
            if (moveState.forward || moveState.backward || moveState.left || moveState.right) {
                // Rotation
                if (moveState.left || moveState.right) {
                    const turnSpeed = 0.04;
                    const angle = (moveState.left ? turnSpeed : 0) + (moveState.right ? -turnSpeed : 0);
                    const dir = new THREE.Vector3().subVectors(controls.target, camera.position);
                    dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
                    controls.target.copy(camera.position).add(dir);
                }

                // Forward/Backward movement
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                forward.y = 0; // Move only on XZ plane
                if (forward.lengthSq() > 0) forward.normalize();
                
                const velocity = new THREE.Vector3();
                
                if (moveState.forward) velocity.add(forward);
                if (moveState.backward) velocity.sub(forward);
                
                if (velocity.lengthSq() > 0) {
                    velocity.normalize().multiplyScalar(moveSpeed);
                    camera.position.add(velocity);
                    controls.target.add(velocity);
                }
            }

            // Calculate Ground Height
            let groundHeight = 0;
            let tx = camera.position.x;
            let tz = camera.position.z;
            let ty = Math.sin(tx * 0.1) * Math.cos(tz * 0.1) * 2.0;
            ty += Math.sin(tx * 0.05 + tz * 0.03) * 3.0;
            ty += Math.sin(tx * 0.2 - tz * 0.2) * 0.5;
            groundHeight = ty;
            
            // Check floating islands for collision
            scene.children.forEach(child => {
                if (child.geometry === islandGeo) {
                    const distSq = Math.pow(camera.position.x - child.position.x, 2) + Math.pow(camera.position.z - child.position.z, 2);
                    const radiusSq = Math.pow(child.scale.x * 1.2, 2); // Slightly larger radius for forgiveness
                    if (distSq < radiusSq) {
                        const islandTop = child.position.y + child.scale.y * 0.8;
                        if (camera.position.y >= islandTop - 0.5) { // If above or near top
                            if (islandTop > groundHeight) {
                                groundHeight = islandTop;
                            }
                        }
                    }
                }
            });
            
            // Apply Gravity
            playerVelocityY -= gravity;
            const prevY = camera.position.y;
            camera.position.y += playerVelocityY;
            
            // Floor collision
            if (camera.position.y <= groundHeight + playerHeight) {
                camera.position.y = groundHeight + playerHeight;
                playerVelocityY = 0;
                canJump = true;
            }
            
            // Match controls target Y
            controls.target.y += (camera.position.y - prevY);

            controls.update();

            // Update terrain shader
            if (terrainMat.userData.shader) {
                terrainMat.userData.shader.uniforms.time.value = time;
            }

            // Animate islands
            scene.children.forEach(child => {
                if (child.geometry === islandGeo) {
                    const data = child.userData;
                    child.position.y = data.baseY + Math.sin(time * data.speed + data.offset) * 0.5;
                }
            });

            // Animate embers rising
            const pPositions = particles.geometry.attributes.position.array;
            for(let i=0; i<pCount*3; i+=3) {
                pPositions[i+1] += 0.02 + Math.sin(time * 2.0 + pPositions[i]) * 0.01; // float up and wave
                pPositions[i] += Math.sin(time + pPositions[i+1]) * 0.01; // sway X
                if (pPositions[i+1] > 20) {
                    pPositions[i+1] = 0; // reset to bottom
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;

            // Animate Auroras
            auroras.forEach(a => {
                // Update shader time
                a.body.material.uniforms.time.value = time;
                
                // Height based on terrain
                let tx = a.obj.position.x;
                let tz = a.obj.position.z;
                let ty = Math.sin(tx * 0.1) * Math.cos(tz * 0.1) * 2.0;
                ty += Math.sin(tx * 0.05 + tz * 0.03) * 3.0;
                ty += Math.sin(tx * 0.2 - tz * 0.2) * 0.5;
                a.baseY = ty + 1.5; // Float above terrain

                const distToPlayer = camera.position.distanceTo(a.obj.position);
                
                if (distToPlayer < 8.0) {
                    // Player is close! Get happy and hop
                    a.faceMat.map = faceTexHappy;
                    
                    // Turn to face player
                    const targetRot = Math.atan2(camera.position.x - a.obj.position.x, camera.position.z - a.obj.position.z);
                    
                    // Normalize rotation to prevent spinning the long way
                    let diff = targetRot - a.obj.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    a.obj.rotation.y += diff * 0.1;
                    
                    // Happy hop
                    a.obj.position.y = a.baseY + Math.abs(Math.sin(time * 10.0)) * 1.5;
                } else {
                    // Normal behavior
                    a.obj.position.x += a.speedX;
                    a.obj.position.z += a.speedZ;
                    
                    a.obj.position.y = a.baseY + Math.sin(time * 3.0 * a.energy + a.phase) * 0.2; // faster fire bob
                    
                    // Wrap around terrain
                    if (a.obj.position.x > 30) a.obj.position.x = -30;
                    if (a.obj.position.x < -30) a.obj.position.x = 30;
                    if (a.obj.position.z > 30) a.obj.position.z = -30;
                    if (a.obj.position.z < -30) a.obj.position.z = 30;
                    
                    // Point facing direction
                    const targetRot = Math.atan2(a.speedX, a.speedZ);
                    let diff = targetRot - a.obj.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    a.obj.rotation.y += diff * 0.08;

                    // Blinking logic
                    a.blinkTimer--;
                    if (!a.isBlinking && a.blinkTimer <= 0) {
                        a.isBlinking = true;
                        a.blinkDuration = Math.max(5, 15 - a.energy * 3); 
                        a.faceMat.map = faceTexBlink; 
                    }
                    
                    if (a.isBlinking) {
                        a.blinkDuration--;
                        if (a.blinkDuration <= 0) {
                            a.isBlinking = false;
                            a.faceMat.map = faceTexOpen; 
                            a.blinkTimer = Math.random() * (200 / a.energy) + 50;
                        }
                    }
                }
            });

            renderer.render(scene, camera);
        }

        renderer.setAnimationLoop(render);

        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
